version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  crypto: ^3.0.7
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  google_maps_flutter: ^2.17.0
  http: ^1.6.0
